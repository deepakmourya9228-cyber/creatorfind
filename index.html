<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CreatorFind 3D — Experience the Galaxy</title>
    <style>
        body { margin: 0; background: #05050a; color: white; font-family: 'Syne', sans-serif; overflow: hidden; }
        canvas { display: block; }
        
        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 40px; box-sizing: border-box;
        }
        .header { pointer-events: auto; }
        .logo { font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .logo span { color: #c8f135; }
        
        .instructions {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            padding: 10px 20px; border-radius: 100px;
            backdrop-filter: blur(10px); font-size: 12px;
        }

        #info-card {
            position: absolute; right: 40px; top: 50%;
            transform: translateY(-50%);
            width: 300px; background: rgba(19, 19, 26, 0.9);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px; border-radius: 20px;
            display: none; pointer-events: auto;
            backdrop-filter: blur(20px);
        }
        .accent { color: #c8f135; font-weight: bold; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
</head>
<body>

<div id="ui-layer">
    <div class="header">
        <div class="logo">Creator<span>Find</span> 3D</div>
    </div>
    <div class="instructions">Drag to Rotate • Scroll to Zoom • Click a Creator</div>
    
    <div id="info-card">
        <h2 id="c-name">Creator Name</h2>
        <p id="c-genre" class="accent">Fashion</p>
        <p id="c-bio" style="font-size: 14px; color: #aaa;">Bio goes here...</p>
        <button style="width:100%; padding:10px; background:#c8f135; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Contact Creator</button>
    </div>
</div>

<script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. Setup Scene
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 2. Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0xc8f135, 2);
    pointLight.position.set(10, 10, 10);
    scene.add(pointLight);

    // 3. Creator Data (Sample)
    const creators = [
        { name: "Priya Sharma", genre: "Fashion", color: 0xff5fa0, pos: [3, 1, -2] },
        { name: "Arjun Fit", genre: "Fitness", color: 0xc8f135, pos: [-2, 2, 1] },
        { name: "Tech Raj", genre: "Tech", color: 0x5fb4ff, pos: [0, -2, 3] },
        { name: "Riya Eats", genre: "Food", color: 0xff8c42, pos: [-4, -1, -3] },
        { name: "Sahil Memes", genre: "Comedy", color: 0xa855f7, pos: [2, 3, 2] }
    ];

    const creatorNodes = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // 4. Create 3D Nodes
    creators.forEach((data) => {
        const geometry = new THREE.IcosahedronGeometry(0.6, 0); // Geometric 3D shape
        const material = new THREE.MeshStandardMaterial({ 
            color: data.color, 
            wireframe: false,
            emissive: data.color,
            emissiveIntensity: 0.2
        });
        const node = new THREE.Mesh(geometry, material);
        node.position.set(...data.pos);
        node.userData = data;
        scene.add(node);
        creatorNodes.push(node);

        // Add a "ring" around it
        const ringGeo = new THREE.TorusGeometry(0.8, 0.02, 16, 100);
        const ringMat = new THREE.MeshBasicMaterial({ color: data.color, transparent: true, opacity: 0.3 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        node.add(ring);
    });

    // 5. Starfield Background
    const starGeo = new THREE.BufferGeometry();
    const starCount = 3000;
    const posArray = new Float32Array(starCount * 3);
    for(let i=0; i<starCount * 3; i++) posArray[i] = (Math.random() - 0.5) * 50;
    starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const starMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    camera.position.z = 8;

    // 6. Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;

    // 7. Interaction
    window.addEventListener('click', (event) => {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(creatorNodes);

        if (intersects.length > 0) {
            const data = intersects[0].object.userData;
            document.getElementById('info-card').style.display = 'block';
            document.getElementById('c-name').innerText = data.name;
            document.getElementById('c-genre').innerText = data.genre;
            document.getElementById('c-genre').style.color = `#${data.color.toString(16)}`;
        } else {
            document.getElementById('info-card').style.display = 'none';
        }
    });

    // 8. Animation Loop
    function animate() {
        requestAnimationFrame(animate);
        
        creatorNodes.forEach(node => {
            node.rotation.y += 0.01;
            node.children[0].rotation.x += 0.02;
        });

        stars.rotation.y += 0.0005;
        
        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    // Handle Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
