<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorFind — India's Influencer Discovery Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* KEEP YOUR ORIGINAL CSS EXACTLY — trimmed here for space */
/* IMPORTANT: your existing CSS already works */

body {
  background:#0a0a0f;
  color:#fff;
  font-family:'DM Sans', sans-serif;
}

/* modal (already had, keeping safe) */
.ig-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.ig-modal-content {
  background: #13131a;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 28px;
  border-radius: 16px;
  width: 400px;
}

.btn-accent {
  background:#c8f135;
  border:none;
  padding:10px 16px;
  cursor:pointer;
}

.btn-ghost {
  background:transparent;
  border:1px solid #555;
  padding:10px 16px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<div style="padding:20px;">
  <button class="btn-ghost">List your profile</button>
  <button class="btn-accent">I'm a brand</button>
</div>

<!-- GRID -->
<div id="grid" style="padding:20px;"></div>

<!-- ✅ FIXED MODAL -->
<div class="ig-modal" id="igModal">
  <div class="ig-modal-content" id="modalBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// SUPABASE
const supabaseUrl = "https://ybrwjudaxuxoksyocbvn.supabase.co";
const supabaseKey = "YOUR_KEY"; // ⚠️ REPLACE
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

// DATA
let creators = [];

// LOAD DATA
async function loadCreators() {
  const { data } = await supabaseClient.from("creators").select("*");
  creators = data || [];
  render();
}

// RENDER GRID
function render() {
  document.getElementById("grid").innerHTML =
    creators.map(c => `<div>${c.name} (${c.handle})</div>`).join("");
}

// BUTTON INIT (FIXED)
function initButtons() {
  const creatorBtn = document.querySelector(".btn-ghost");
  const brandBtn = document.querySelectorAll(".btn-accent")[0];

  creatorBtn.onclick = openCreatorFlow;
  brandBtn.onclick = openBrandFlow;
}

// FLOWS
function openBrandFlow() {
  showModal(
    "Welcome, Brand 🚀",
    "Browse creators and connect instantly.",
    "Start exploring",
    closeModal
  );
}

function openCreatorFlow() {
  showModal(
    "Join as Creator ✨",
    "List your profile to get brand deals.",
    "Add Profile",
    goToCreatorForm
  );
}

// FORM HTML
function getFormHTML() {
  return `
    <h2>✨ List Your Profile</h2>
    <p>Fill this to get discovered by brands.</p>

    <form onsubmit="submitCreator(event)">
      <input id="name" placeholder="Name" required><br><br>
      <input id="handle" placeholder="Instagram handle" required><br><br>
      <input id="followers" type="number" placeholder="Followers" required><br><br>
      <input id="bio" placeholder="Bio"><br><br>
      <input id="rate" placeholder="Rate"><br><br>

      <button class="btn-accent">Submit</button>
      <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
    </form>
  `;
}

// OPEN FORM (FIXED)
function goToCreatorForm() {
  const modal = document.getElementById("igModal");
  const box = document.getElementById("modalBox");

  box.innerHTML = getFormHTML();
  modal.style.display = "flex";
}

// SUBMIT
async function submitCreator(e) {
  e.preventDefault();

  const data = {
    name: name.value,
    handle: handle.value,
    followers: parseInt(followers.value),
    bio: bio.value,
    rate: rate.value
  };

  const { error } = await supabaseClient
    .from("creators")
    .insert([data]);

  if (error) {
    alert("Error saving profile");
    return;
  }

  // SUCCESS UI
  document.getElementById("modalBox").innerHTML = `
    <h2>🎉 Profile Submitted!</h2>
    <p>Your profile is live.</p>
    <button class="btn-accent" onclick="closeModal()">Awesome 🚀</button>
  `;

  loadCreators();
}

// MODAL SYSTEM (FIXED)
function showModal(title, text, actionText, actionFn) {
  const modal = document.getElementById("igModal");
  const box = document.getElementById("modalBox");

  box.innerHTML = `
    <h2>${title}</h2>
    <p>${text}</p>
    <button class="btn-accent">${actionText}</button>
    <button class="btn-ghost" onclick="closeModal()">Cancel</button>
  `;

  box.querySelector(".btn-accent").onclick = actionFn;
  modal.style.display = "flex";
}

function closeModal() {
  document.getElementById("igModal").style.display = "none";
}

// INIT
document.addEventListener("DOMContentLoaded", () => {
  initButtons();
  loadCreators();
});
</script>

</body>
</html>
