<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorFind — 3D Discovery Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --surface: rgba(25, 25, 35, 0.7);
    --surface-solid: #13131a;
    --border: rgba(255,255,255,0.1);
    --accent: #c8f135;
    --text: #f0f0f5;
    --muted: #8a8a9a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'DM Sans', sans-serif; 
    perspective: 1200px; /* Essential for 3D */
    overflow-x: hidden;
  }

  /* Animated 3D Background */
  .grid-bg {
    position: fixed; inset: 0;
    background-image: 
      linear-gradient(rgba(200, 241, 53, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200, 241, 53, 0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    transform: rotateX(60deg) translateY(-200px);
    z-index: -1;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 1000px; } }

  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; }

  /* --- NAV --- */
  nav { 
    position: sticky; top: 0; z-index: 1000;
    background: rgba(5, 5, 8, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
  }
  .nav-inner { display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; text-decoration: none; color: white; }
  .logo span { color: var(--accent); }
  .btn-accent { 
    background: var(--accent); color: black; border: none; 
    padding: 10px 20px; border-radius: 12px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 15px rgba(200, 241, 53, 0.3); transition: 0.3s;
  }
  .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(200, 241, 53, 0.5); }

  /* --- HERO (Spatial Layer) --- */
  .hero { 
    padding: 100px 0 60px; text-align: center; 
    transform-style: preserve-3d;
  }
  .hero h1 { 
    font-family: 'Syne', sans-serif; font-size: 72px; line-height: 1; margin-bottom: 24px;
    transform: translateZ(50px); /* Pushes text forward */
  }

  /* --- 3D CARDS --- */
  .creators-grid { 
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
    gap: 30px; padding-bottom: 100px;
  }
  
  .creator-card {
    background: var(--surface);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    transition: transform 0.1s ease-out, box-shadow 0.3s ease;
    transform-style: preserve-3d;
    cursor: pointer;
    position: relative;
  }

  .creator-card:hover {
    border-color: var(--accent);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .card-content { transform: translateZ(30px); } /* UI floats above card */

  .avatar {
    width: 60px; height: 60px; border-radius: 50%;
    background: var(--accent); color: black;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-family: 'Syne'; margin-bottom: 16px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  }

  /* --- FILTERS --- */
  .filter-section {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px; margin-bottom: 40px;
    backdrop-filter: blur(20px);
  }

  .pill {
    padding: 8px 18px; border-radius: 100px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; transition: 0.2s;
  }
  .pill.active { background: var(--accent); color: black; border-color: var(--accent); }

  /* --- DETAIL PANEL (Layered) --- */
  .detail-panel {
    position: fixed; top: 10%; left: 50%; transform: translateX(-50%);
    width: 90%; max-width: 800px; height: 80vh;
    background: var(--surface-solid);
    border: 1px solid var(--accent);
    border-radius: 32px; z-index: 2000;
    display: none; padding: 40px;
    box-shadow: 0 0 100px rgba(0,0,0,0.8);
    overflow-y: auto;
  }
  .detail-panel.open { display: block; animation: panelIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes panelIn { from { opacity: 0; transform: translateX(-50%) translateZ(-100px); } }

  .btn-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: white; cursor: pointer; font-size: 24px; }

  /* Modal Overlays for all buttons */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: none; align-items: center; justify-content: center; z-index: 3000;
  }
  .modal-box { 
    background: var(--surface-solid); border: 1px solid var(--border);
    padding: 40px; border-radius: 24px; max-width: 400px; width: 100%;
  }

  input, select, textarea {
    width: 100%; padding: 12px; background: #0a0a0f; border: 1px solid var(--border);
    border-radius: 10px; color: white; margin-top: 8px; margin-bottom: 20px;
  }

</style>
</head>
<body>

<div class="grid-bg"></div>

<nav>
  <div class="container nav-inner">
    <a href="#" class="logo">creator<span>find</span></a>
    <div style="display: flex; gap: 12px;">
        <button class="pill" onclick="openModal('creatorModal')">List Profile</button>
        <button class="btn-accent" onclick="openModal('brandModal')">I'm a Brand</button>
    </div>
  </div>
</nav>

<div class="container">
  <section class="hero">
    <h1>Discover the<br><span style="color:var(--accent)">Spatial Creator</span> Economy</h1>
    <p style="color:var(--muted); font-size: 18px; max-width: 600px; margin: 0 auto;">Experience influencer discovery in 3D. Filter by niche, reach, and engagement.</p>
  </section>

  <section class="filter-section">
    <div id="genrePills" style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="pill active" data-genre="all">All</button>
        <button class="pill" data-genre="fashion">Fashion</button>
        <button class="pill" data-genre="tech">Tech</button>
        <button class="pill" data-genre="fitness">Fitness</button>
        <button class="pill" data-genre="food">Food</button>
    </div>
  </section>

  <div class="creators-grid" id="grid">
    </div>
</div>

<div class="detail-panel" id="detailPanel">
    <button class="btn-close" onclick="closeDetail()">✕</button>
    <div id="panelContent"></div>
</div>

<div class="overlay" id="creatorModal">
    <div class="modal-box">
        <h2 style="margin-bottom: 20px;">List your Profile</h2>
        <input type="text" placeholder="Full Name">
        <input type="text" placeholder="Instagram Handle">
        <select>
            <option>Fashion</option>
            <option>Tech</option>
        </select>
        <button class="btn-accent" style="width: 100%;" onclick="closeModal('creatorModal')">Submit →</button>
    </div>
</div>

<div class="overlay" id="brandModal">
    <div class="modal-box">
        <h2 style="margin-bottom: 20px;">For Brands</h2>
        <p style="color:var(--muted); margin-bottom: 20px;">Connect with top-tier Indian creators instantly.</p>
        <input type="email" placeholder="Work Email">
        <button class="btn-accent" style="width: 100%;" onclick="closeModal('brandModal')">Get Access</button>
    </div>
</div>

<script>
const creators = [
  {id:1, name:"Priya Sharma", handle:"@priyastyled", genre:"fashion", followers:"820K", eng:"4.2%", avatar:"PS", bio:"Fashion & lifestyle creator from Mumbai."},
  {id:2, name:"Arjun Fitness", handle:"@arjunfit", genre:"fitness", followers:"340K", eng:"6.8%", avatar:"AF", bio:"Certified trainer and nutrition expert."},
  {id:3, name:"TechWala Raj", handle:"@techwalaraj", genre:"tech", followers:"280K", eng:"7.3%", avatar:"TR", bio:"Hindi tech reviews and unboxing."},
  {id:4, name:"Riya Eats", handle:"@riyaeats", genre:"food", followers:"1.2M", eng:"5.1%", avatar:"RE", bio:"Street food and recipe explorer."}
];

function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = creators.map(c => `
        <div class="creator-card" onmousemove="tilt(event, this)" onmouseleave="resetTilt(this)" onclick="openDetail(${c.id})">
            <div class="card-content">
                <div class="avatar">${c.avatar}</div>
                <h3>${c.name}</h3>
                <p style="color:var(--muted); font-size: 14px;">${c.handle}</p>
                <div style="margin-top: 15px; display: flex; justify-content: space-between;">
                    <span><b>${c.followers}</b></span>
                    <span style="color:var(--accent)">${c.eng}</span>
                </div>
            </div>
        </div>
    `).join('');
}

// 3D Tilt Logic
function tilt(e, card) {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    const rotateX = (y - centerY) / 10;
    const rotateY = (centerX - x) / 10;

    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
}

function resetTilt(card) {
    card.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
}

function openDetail(id) {
    const c = creators.find(x => x.id === id);
    const panel = document.getElementById('detailPanel');
    document.getElementById('panelContent').innerHTML = `
        <h1 style="font-family:Syne; font-size:40px;">${c.name}</h1>
        <p class="accent">${c.handle}</p>
        <p style="margin: 20px 0; line-height: 1.6;">${c.bio}</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div style="background:#0a0a0f; padding:20px; border-radius:15px;">
                <small>Followers</small><h2>${c.followers}</h2>
            </div>
            <div style="background:#0a0a0f; padding:20px; border-radius:15px;">
                <small>Engagement</small><h2>${c.eng}</h2>
            </div>
        </div>
        <button class="btn-accent" style="width:100%; margin-top:40px; padding:20px;">Contact Creator →</button>
    `;
    panel.classList.add('open');
}

function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); }
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

render();
</script>
</body>
</html>
