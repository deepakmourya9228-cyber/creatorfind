<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorFind</title>

<style>
/* KEEP YOUR EXISTING CSS — unchanged */

/* ADD THIS (modal already in your CSS but keeping safe) */
.ig-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
</style>
</head>

<body>

<!-- NAV -->
<button class="btn-ghost">List your profile</button>
<button class="btn-accent">I'm a brand</button>

<!-- GRID -->
<div id="grid"></div>

<!-- ✅ MODAL -->
<div class="ig-modal" id="igModal">
  <div class="ig-modal-content" id="modalBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ✅ SUPABASE
const supabaseUrl = "https://ybrwjudaxuxoksyocbvn.supabase.co";
const supabaseKey = "YOUR_KEY"; // ⚠️ PUT REAL KEY
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

// DATA
let creators = [];

// LOAD
async function loadCreators() {
  const { data } = await supabaseClient.from("creators").select("*");
  creators = data || [];
  render();
}

// RENDER
function render() {
  document.getElementById("grid").innerHTML =
    creators.map(c => `<div>${c.name} - ${c.handle}</div>`).join("");
}

// BUTTONS
function initButtons() {
  const creatorBtn = document.querySelector(".btn-ghost");
  const brandBtn = document.querySelectorAll(".btn-accent")[0];

  creatorBtn.onclick = openCreatorFlow;
  brandBtn.onclick = openBrandFlow;
}

// FLOWS
function openBrandFlow() {
  showCustomModal(
    "Welcome, Brand 🚀",
    "Browse and contact creators.",
    "Start exploring",
    closeModal
  );
}

function openCreatorFlow() {
  showCustomModal(
    "Join as Creator ✨",
    "List your profile to get brand deals.",
    "Add Profile",
    goToCreatorForm
  );
}

// ✅ FORM HTML
function getFormHTML() {
  return `
    <h2>✨ List Your Profile</h2>
    <p>Fill this to get discovered by brands.</p>

    <form onsubmit="submitCreator(event)">
      <input placeholder="Name" id="name" required><br><br>
      <input placeholder="Instagram handle" id="handle" required><br><br>
      <input placeholder="Followers" id="followers" type="number" required><br><br>
      <input placeholder="Bio" id="bio"><br><br>
      <input placeholder="Rate" id="rate"><br><br>

      <button class="btn-accent" type="submit">Submit</button>
      <button type="button" onclick="closeModal()">Cancel</button>
    </form>
  `;
}

// OPEN FORM
function goToCreatorForm() {
  const modal = document.getElementById("igModal");
  const box = document.getElementById("modalBox");

  box.innerHTML = getFormHTML();
  modal.style.display = "flex";
}

// SUBMIT
async function submitCreator(e) {
  e.preventDefault();

  const data = {
    name: name.value,
    handle: handle.value,
    followers: parseInt(followers.value),
    bio: bio.value,
    rate: rate.value
  };

  const { error } = await supabaseClient
    .from("creators")
    .insert([data]);

  if (error) {
    alert("Error saving");
    return;
  }

  // SUCCESS UI
  document.getElementById("modalBox").innerHTML = `
    <h2>🎉 Profile Submitted!</h2>
    <button onclick="closeModal()">Close</button>
  `;

  loadCreators();
}

// MODAL
function showCustomModal(title, text, actionText, actionFn) {
  const modal = document.getElementById("igModal");
  const box = document.getElementById("modalBox");

  box.innerHTML = `
    <h2>${title}</h2>
    <p>${text}</p>
    <button class="btn-accent">${actionText}</button>
    <button onclick="closeModal()">Cancel</button>
  `;

  box.querySelector(".btn-accent").onclick = actionFn;
  modal.style.display = "flex";
}

function closeModal() {
  document.getElementById("igModal").style.display = "none";
}

// INIT
document.addEventListener("DOMContentLoaded", () => {
  initButtons();
  loadCreators();
});
</script>

</body>
</html>
