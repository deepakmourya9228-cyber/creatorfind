<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatorFind — India's Influencer Discovery Platform</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #c8f135;
            --bg: #0a0a0f;
            --card-bg: #13131a;
            --text: #ffffff;
            --border: rgba(255,255,255,0.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        nav {
            padding: 24px 40px;
            display: flex;
            gap: 15px;
            border-bottom: 1px solid var(--border);
        }

        /* Grid System */
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 40px;
        }

        .creator-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.2s ease;
        }

        .creator-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .creator-card h3 {
            margin: 0 0 4px 0;
            font-family: 'Syne', sans-serif;
            color: var(--accent);
        }

        .creator-card .handle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        /* Modal Styling */
        .ig-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }

        .ig-modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 32px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
        }

        /* Buttons */
        .btn-accent {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 700;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid #444;
            color: #fff;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
        }

        /* Form Controls */
        input, textarea {
            width: 100%;
            background: #1a1a24;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        h2 { font-family: 'Syne', sans-serif; margin-top: 0; }
    </style>
</head>
<body>

<nav>
    <button class="btn-ghost" onclick="openCreatorFlow()">List your profile</button>
    <button class="btn-accent" onclick="openBrandFlow()">I'm a brand</button>
</nav>

<div id="grid">
    </div>

<div class="ig-modal" id="igModal">
    <div class="ig-modal-content" id="modalBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. SUPABASE CONFIG
    const supabaseUrl = "https://ybrwjudaxuxoksyocbvn.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlicndqdWRheHV4b2tzeW9jYnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODYyMzQsImV4cCI6MjA5MjI2MjIzNH0.KjE88t46wPOvYDwWcTd6J866TY87ThY9hQg-80o4I1A"
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    let creators = [];

    // 2. LOAD DATA FROM DATABASE
    async function loadCreators() {
        const grid = document.getElementById("grid");
        grid.innerHTML = `<p style="color:#888;">Loading the best talent...</p>`;

        const { data, error } = await supabaseClient
            .from("creators")
            .select("*")
            .order('created_at', { ascending: false });

        if (error) {
            grid.innerHTML = `<p style="color:red;">Error fetching creators. Check your Supabase Key.</p>`;
            return;
        }

        creators = data || [];
        render();
    }

    // 3. RENDER GRID
    function render() {
        const grid = document.getElementById("grid");
        if (creators.length === 0) {
            grid.innerHTML = `<p>No creators listed yet. Be the first!</p>`;
            return;
        }

        grid.innerHTML = creators.map(c => `
            <div class="creator-card">
                <h3>${c.name}</h3>
                <div class="handle">@${c.handle.replace('@', '')}</div>
                <div style="margin-bottom: 10px;">
                    <span style="color:var(--accent); font-weight:bold;">${Number(c.followers).toLocaleString()}</span> 
                    <span style="font-size:0.8rem; opacity:0.7;">FOLLOWERS</span>
                </div>
                <p style="font-size:0.9rem; color:#ccc; min-height:40px;">${c.bio || 'No bio provided.'}</p>
                <div style="border-top: 1px solid #222; padding-top:15px; font-weight:bold;">
                    Rate: ${c.rate || 'Inquire'}
                </div>
            </div>
        `).join("");
    }

    // 4. FLOWS & MODAL LOGIC
    function openBrandFlow() {
        showModal(
            "Welcome, Brand 🚀",
            "Browse through India's top influencers and connect with them for your next campaign.",
            "Start Exploring",
            closeModal
        );
    }

    function openCreatorFlow() {
        showModal(
            "Join as Creator ✨",
            "Fill out your details to get listed and start receiving collaboration requests from brands.",
            "Add My Profile",
            goToCreatorForm
        );
    }

    function goToCreatorForm() {
        const box = document.getElementById("modalBox");
        box.innerHTML = `
            <h2>✨ List Profile</h2>
            <form id="creatorForm">
                <input type="text" id="ins_name" placeholder="Full Name" required>
                <input type="text" id="ins_handle" placeholder="Instagram Handle (e.g. @username)" required>
                <input type="number" id="ins_followers" placeholder="Follower Count" required>
                <input type="text" id="ins_rate" placeholder="Base Rate (e.g. ₹10,000 / post)">
                <textarea id="ins_bio" placeholder="Briefly describe your niche..." rows="3"></textarea>
                
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button type="submit" class="btn-accent" style="flex:1;">Submit</button>
                    <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        `;

        document.getElementById("creatorForm").onsubmit = submitCreator;
    }

    async function submitCreator(e) {
        e.preventDefault();
        
        // Grab values securely
        const data = {
            name: document.getElementById("ins_name").value,
            handle: document.getElementById("ins_handle").value,
            followers: parseInt(document.getElementById("ins_followers").value),
            bio: document.getElementById("ins_bio").value,
            rate: document.getElementById("ins_rate").value
        };

        const { error } = await supabaseClient
            .from("creators")
            .insert([data]);

        if (error) {
            alert("Error: " + error.message);
            return;
        }

        // Success State
        document.getElementById("modalBox").innerHTML = `
            <div style="text-align:center;">
                <h2 style="font-size:3rem;">🎉</h2>
                <h2>You're Listed!</h2>
                <p>Your profile is now live for brands to see.</p>
                <button class="btn-accent" onclick="closeModal()">Awesome!</button>
            </div>
        `;

        loadCreators();
    }

    function showModal(title, text, actionText, actionFn) {
        const modal = document.getElementById("igModal");
        const box = document.getElementById("modalBox");

        box.innerHTML = `
            <h2>${title}</h2>
            <p style="color:#aaa; line-height:1.6; margin-bottom:24px;">${text}</p>
            <div style="display:flex; gap:10px;">
                <button class="btn-accent" id="modalActionBtn">${actionText}</button>
                <button class="btn-ghost" onclick="closeModal()">Cancel</button>
            </div>
        `;

        document.getElementById("modalActionBtn").onclick = actionFn;
        modal.style.display = "flex";
    }

    function closeModal() {
        document.getElementById("igModal").style.display = "none";
    }

    // Initialize
    document.addEventListener("DOMContentLoaded", () => {
        loadCreators();
    });
</script>

</body>
</html>
