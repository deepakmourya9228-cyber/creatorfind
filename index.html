<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorFind</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  background:#0a0a0f;
  color:#fff;
  font-family:'DM Sans', sans-serif;
  margin:0;
}

/* NAV */
.nav {
  padding:20px;
  display:flex;
  gap:10px;
}

.btn-accent {
  background:#c8f135;
  border:none;
  padding:10px 18px;
  cursor:pointer;
}

.btn-ghost {
  background:transparent;
  border:1px solid #444;
  color:#aaa;
  padding:10px 18px;
  cursor:pointer;
}

/* GRID */
#grid {
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;
}

.card {
  background:#13131a;
  border:1px solid rgba(255,255,255,0.08);
  padding:16px;
  border-radius:10px;
}

/* MODAL */
.ig-modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.ig-modal-content {
  background:#13131a;
  padding:24px;
  border-radius:12px;
  width:320px;
}
</style>
</head>

<body>

<div class="nav">
  <button class="btn-ghost">List your profile</button>
  <button class="btn-accent">I'm a brand</button>
</div>

<div id="grid"></div>

<!-- MODAL -->
<div class="ig-modal" id="igModal">
  <div class="ig-modal-content" id="modalBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ⚠️ Replace later with real key
const supabaseUrl = "https://ybrwjudaxuxoksyocbvn.supabase.co";
const supabaseKey = "YOUR_KEY";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let creators = [];

// LOAD (WITH FALLBACK)
async function loadCreators() {
  const { data, error } = await supabaseClient
    .from("creators")
    .select("*");

  if (error || !data) {
    console.warn("Using fallback data");

    creators = [
      {
        id:1,
        name:"Riya Sharma",
        handle:"@riya.lifestyle",
        followers:12000,
        bio:"Lifestyle creator",
        rate:"₹5k"
      },
      {
        id:2,
        name:"Arjun Tech",
        handle:"@arjun.tech",
        followers:85000,
        bio:"Tech reviews",
        rate:"₹15k"
      }
    ];
  } else {
    creators = data;
  }

  render();
}

// RENDER
function render() {
  document.getElementById("grid").innerHTML =
    creators.map(c => `
      <div class="card">
        <b>${c.name}</b><br>
        ${c.handle}<br>
        ${c.followers} followers
      </div>
    `).join("");
}

// BUTTON FIX
function initButtons() {
  const creatorBtn = document.querySelector(".btn-ghost");
  const brandBtn = document.querySelectorAll(".btn-accent")[0];

  creatorBtn.onclick = openCreatorFlow;
  brandBtn.onclick = openBrandFlow;
}

// FLOWS
function openBrandFlow() {
  showModal(
    "Welcome, Brand 🚀",
    "Browse creators and connect.",
    "Start",
    closeModal
  );
}

function openCreatorFlow() {
  showModal(
    "Join as Creator ✨",
    "List your profile.",
    "Add Profile",
    goToCreatorForm
  );
}

// FORM
function getFormHTML() {
  return `
    <h3>Add Profile</h3>
    <form onsubmit="submitCreator(event)">
      <input id="name" placeholder="Name" required><br><br>
      <input id="handle" placeholder="Handle" required><br><br>
      <input id="followers" type="number" placeholder="Followers" required><br><br>

      <button class="btn-accent">Submit</button>
      <button type="button" onclick="closeModal()">Cancel</button>
    </form>
  `;
}

function goToCreatorForm() {
  document.getElementById("modalBox").innerHTML = getFormHTML();
  document.getElementById("igModal").style.display = "flex";
}

// SUBMIT
async function submitCreator(e) {
  e.preventDefault();

  const data = {
    name: name.value,
    handle: handle.value,
    followers: parseInt(followers.value)
  };

  const { error } = await supabaseClient
    .from("creators")
    .insert([data]);

  if (error) {
    alert("Saved locally (no key)");
  }

  document.getElementById("modalBox").innerHTML = `
    <h3>🎉 Added!</h3>
    <button onclick="closeModal()">Close</button>
  `;

  creators.push(data);
  render();
}

// MODAL
function showModal(title, text, actionText, actionFn) {
  const box = document.getElementById("modalBox");

  box.innerHTML = `
    <h3>${title}</h3>
    <p>${text}</p>
    <button class="btn-accent">${actionText}</button>
    <button onclick="closeModal()">Cancel</button>
  `;

  box.querySelector(".btn-accent").onclick = actionFn;
  document.getElementById("igModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("igModal").style.display = "none";
}

// INIT
document.addEventListener("DOMContentLoaded", () => {
  initButtons();
  loadCreators();
});
</script>

</body>
</html>
